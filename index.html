<!DOCTYPE html>
<html lang="en">
<head>

<style>
*{box-sizing:border-box}body,html{margin:0;padding:0;width:100%;min-height:100%;font-family:Arial,sans-serif;background:white;overflow-x:hidden}.gradient-bg{width:100%;height:100%;position:fixed;inset:0;filter:blur(80px);z-index:1;pointer-events:none}.color-ball{position:absolute;border-radius:50%;opacity:.45}.ball1{width:60%;height:60%;top:10%;left:8%;background:#64dcff;animation:float 15s infinite}.ball2{width:50%;height:50%;bottom:10%;right:8%;background:#ff64dc;animation:float 20s reverse infinite}@keyframes float{0%{transform:translate(0,0)}50%{transform:translate(10%,15%)}100%{transform:translate(0,0)}}.top-nav{position:fixed;top:0;left:0;width:100%;min-height:60px;background:white;display:flex;align-items:center;justify-content:space-between;padding:0 30px;box-shadow:0 2px 15px rgba(0,0,0,.06);z-index:1000}.nav-left,.nav-right{display:flex;align-items:center;gap:18px}.nav-item{color:#222;text-decoration:none;font-weight:600;font-size:15px;cursor:pointer;border:none;background:none;padding:8px 0}.nav-item:hover{color:#000;text-shadow:2px 2px 4px rgba(0,0,0,.25)}.dropdown{position:relative}.dropdown-menu{display:none;position:absolute;top:38px;left:0;background:white;min-width:200px;border-radius:12px;box-shadow:0 12px 30px rgba(0,0,0,.12);border:1px solid rgba(0,0,0,.06);overflow:hidden;z-index:1200}.dropdown-menu button{width:100%;padding:14px 16px;border:none;background:white;text-align:left;cursor:pointer;font-weight:600;color:#333}.dropdown-menu button:hover{background:#f4f6ff}.dropdown.open .dropdown-menu{display:block}.auth-box{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end}.auth-box input{width:150px;padding:8px 10px;border-radius:10px;border:1px solid #ddd;outline:none;background:#fff}.small-btn{border:none;background:#0061ff;color:white;padding:8px 12px;border-radius:10px;cursor:pointer;font-weight:600}.small-btn.secondary{background:#eee;color:#222}.user-status{font-size:12px;color:#333;max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.search-outer-container{position:fixed;top:75px;left:0;width:100%;display:flex;justify-content:center;z-index:900;padding:0 18px}.search-box{width:100%;max-width:460px;position:relative}.search-input{width:100%;padding:13px 48px 13px 20px;border-radius:25px;border:1px solid #eee;background:rgba(255,255,255,.94);outline:none;box-shadow:0 4px 12px rgba(0,0,0,.06)}.search-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:#666;cursor:pointer;display:flex;align-items:center}#searchStatus{display:none;position:fixed;top:130px;left:0;width:100%;text-align:center;color:#ff4444;font-weight:bold;z-index:850;padding:0 18px}.page{display:none;position:relative;z-index:100;min-height:100vh;padding-top:150px}.page.active{display:block}.content-area{width:100%;max-width:1180px;margin:0 auto;padding:0 24px 60px}.section-title{text-align:center;font-size:26px;font-weight:800;margin:15px 0 28px;color:#111}.cards-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(420px,1fr));gap:24px;align-items:start}.app-card{width:100%;max-width:520px;background:rgba(255,255,255,.9);backdrop-filter:blur(15px);border-radius:16px;box-shadow:0 15px 35px rgba(0,0,0,.1);border:1px solid rgba(255,255,255,.7);overflow:hidden;display:flex;flex-direction:column;margin:0 auto;transition:opacity .35s,transform .3s}.app-header{background:rgba(245,245,245,1);padding:12px 20px;border-bottom:1px solid #eee;font-weight:bold;color:#555;font-size:14px}.app-main{display:flex;padding:30px 20px;align-items:center;justify-content:center;position:relative;min-height:245px}.app-content{flex:1;display:flex;flex-direction:column;align-items:center;text-align:center}.mini-icon{position:absolute;bottom:12px;left:12px;width:50px;height:50px;border-radius:10px;object-fit:cover;box-shadow:0 4px 10px rgba(0,0,0,.1);background:white;padding:4px}.banner-logo{width:280px;max-width:85%;height:auto;margin-bottom:15px;object-fit:contain}.app-name{font-size:22px;font-weight:bold;color:#111;margin-bottom:22px}.btn-download{background:#0061ff;color:white;border:none;padding:14px 28px;border-radius:12px;cursor:pointer;font-size:16px;font-weight:600;transition:.3s}.btn-download:hover{background:#004ecc;transform:translateY(-2px)}.white-highlight{animation:whiteFadeOut 3s forwards}@keyframes whiteFadeOut{0%{border:4px solid #fff;box-shadow:0 0 30px 15px rgba(255,255,255,.9);filter:brightness(1.3)}100%{border:1px solid rgba(255,255,255,.7);filter:brightness(1)}}.admin-panel{max-width:760px;margin:24px auto 0;background:rgba(255,255,255,.92);border-radius:18px;box-shadow:0 15px 35px rgba(0,0,0,.1);padding:24px;border:1px solid rgba(255,255,255,.7)}.admin-panel h2{margin:0 0 16px;font-size:22px}.form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.admin-panel input,.admin-panel select{width:100%;padding:12px 14px;border:1px solid #ddd;border-radius:12px;outline:none;background:white}.admin-actions{margin-top:16px;display:flex;gap:10px;flex-wrap:wrap}.about-card{max-width:520px;margin:0 auto;background:rgba(255,255,255,.92);border-radius:18px;box-shadow:0 15px 35px rgba(0,0,0,.1);padding:34px;text-align:center;border:1px solid rgba(255,255,255,.7)}.about-card h1{margin-top:0;font-size:30px}.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.32);z-index:1999}#customAlert{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:white;padding:30px;border-radius:20px;box-shadow:0 20px 50px rgba(0,0,0,.24);z-index:2000;width:340px;text-align:center}.alert-btns{display:flex;gap:10px;justify-content:center;margin-top:20px}.btn-ok{background:#000;color:white;border:none;padding:10px 25px;border-radius:8px;cursor:pointer}.btn-cancel{background:#eee;color:#333;border:none;padding:10px 25px;border-radius:8px;cursor:pointer}@media(max-width:850px){.top-nav{height:auto;align-items:flex-start;padding:12px 18px;flex-direction:column;gap:12px}.nav-left,.nav-right,.auth-box{width:100%}.nav-right{justify-content:space-between}.auth-box{justify-content:flex-start}.auth-box input{width:calc(50% - 8px)}.search-outer-container{top:150px}#searchStatus{top:205px}.page{padding-top:230px}.cards-grid{grid-template-columns:1fr}.form-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<nav class="top-nav"><div class="nav-left"><button class="nav-item" onclick="showPage('home')">Home</button><div class="dropdown" id="categoryDropdown"><button class="nav-item" onclick="toggleDropdown()">Categories</button><div class="dropdown-menu"><button onclick="showPage('os');closeDropdown()">Operating System</button></div></div><button class="nav-item" onclick="showPage('admin')">Add App</button></div><div class="nav-right"><div class="auth-box"><input id="email" type="email" placeholder="Email"><input id="password" type="password" placeholder="Password"><button class="small-btn" onclick="register()">Register</button><button class="small-btn" onclick="login()">Login</button><button class="small-btn secondary" onclick="logout()">Logout</button><span id="userStatus" class="user-status">Not logged in</span></div><button class="nav-item" onclick="showPage('about')">About</button></div></nav>
<div class="search-outer-container"><div class="search-box"><input type="text" id="searchInput" class="search-input" placeholder="Search..." onkeyup="smartSearch()"><button class="search-btn" onclick="smartSearch()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg></button></div></div><div id="searchStatus">No results found</div>
<div class="gradient-bg"><div class="color-ball ball1"></div><div class="color-ball ball2"></div></div>
<main id="homePage" class="page active"><div class="content-area"><div class="section-title">Home</div><div class="cards-grid"><div class="app-card searchable-card" data-name="Waterfox Browser" data-category="Home" data-download="https://github.com/BrowserWorks/waterfox"><div class="app-header">Browser</div><div class="app-main"><img src="https://play-lh.googleusercontent.com/u4zzztxSqLV5qEwhilp8RTP6N0O8BinOVfUs7TN_qeGhWSA86iZ9TM1rPa1lu9o1Kkg" class="mini-icon" alt="Waterfox Icon"><div class="app-content"><img src="https://waterfox.heliopas.ai/wp-content/uploads/2022/09/Logo-mit-neuer-Schrift-v3.png" class="banner-logo" alt="Waterfox Logo"><div class="app-name">Waterfox Browser</div><button class="btn-download" onclick="showAlert('https://github.com/BrowserWorks/waterfox')">Download Now</button></div></div></div></div><div id="homeDynamicApps" class="cards-grid" style="margin-top:24px;"></div></div></main>
<main id="osPage" class="page"><div class="content-area"><div class="section-title">Operating System</div><div class="cards-grid"><div class="app-card searchable-card" data-name="Ubuntu" data-category="Operating System" data-download="https://ubuntu.com/"><div class="app-header">Operating System</div><div class="app-main"><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/9/9e/UbuntuCoF.svg/960px-UbuntuCoF.svg.png" class="mini-icon" alt="Ubuntu Icon"><div class="app-content"><img src="https://fosstorrents.com/img/Banner/ubuntu.webp" class="banner-logo" alt="Ubuntu Banner"><div class="app-name">Ubuntu</div><button class="btn-download" onclick="showAlert('https://ubuntu.com/')">Download Now</button></div></div></div></div><div id="osDynamicApps" class="cards-grid" style="margin-top:24px;"></div></div></main>
<main id="adminPage" class="page"><div class="content-area"><div class="section-title">Add App</div><section class="admin-panel"><h2>Add New Application</h2><div class="form-grid"><input id="appName" placeholder="App name"><select id="appCategory"><option value="Home">Home</option><option value="Operating System">Operating System</option></select><input id="appIcon" placeholder="Small icon URL"><input id="appBanner" placeholder="Banner image URL"><input id="downloadUrl" placeholder="Download URL"></div><div class="admin-actions"><button class="small-btn" onclick="saveApp()">Save App</button><button class="small-btn secondary" onclick="loadApps()">Reload Apps</button></div><p style="font-size:13px;color:#555;margin-top:14px;">You must login before saving app data.</p></section></div></main>
<main id="aboutPage" class="page"><div class="content-area"><div class="about-card"><h1>PMM Open Source</h1><p><b>Version Beta0.1a</b></p><p>This website is an open source software hub prototype.</p></div></div></main>
<div class="overlay" id="overlay"></div><div id="customAlert"><h3 style="margin:0 0 10px 0;">Confirmation</h3><p>Go to download page?</p><div class="alert-btns"><button class="btn-cancel" onclick="hideAlert()">Cancel</button><button class="btn-ok" onclick="goToDownload()">Yes</button></div></div>
<script>
let currentDownloadURL="";function setTitle(pageName){document.title=pageName+" - PMM Open Source"}function showPage(page){document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));if(page==="home"){document.getElementById("homePage").classList.add("active");setTitle("Home")}if(page==="os"){document.getElementById("osPage").classList.add("active");setTitle("Operating System")}if(page==="admin"){document.getElementById("adminPage").classList.add("active");setTitle("Add App")}if(page==="about"){document.getElementById("aboutPage").classList.add("active");setTitle("About")}document.getElementById("searchInput").value="";document.getElementById("searchStatus").style.display="none";document.querySelectorAll(".searchable-card").forEach(card=>{card.style.display="flex";card.style.opacity="1"})}function toggleDropdown(){document.getElementById("categoryDropdown").classList.toggle("open")}function closeDropdown(){document.getElementById("categoryDropdown").classList.remove("open")}document.addEventListener("click",function(event){const dropdown=document.getElementById("categoryDropdown");if(!dropdown.contains(event.target)){dropdown.classList.remove("open")}});function showAlert(url){currentDownloadURL=url;document.getElementById("overlay").style.display="block";document.getElementById("customAlert").style.display="block"}function hideAlert(){document.getElementById("overlay").style.display="none";document.getElementById("customAlert").style.display="none"}function goToDownload(){if(!currentDownloadURL){alert("Download URL not found.");return}window.location.href=currentDownloadURL}function smartSearch(){const query=document.getElementById("searchInput").value.toLowerCase().trim();const cards=document.querySelectorAll(".page.active .searchable-card");const status=document.getElementById("searchStatus");let found=false;if(query===""){cards.forEach(card=>{card.style.display="flex";card.style.opacity="1";card.classList.remove("white-highlight")});status.style.display="none";return}cards.forEach(card=>{const name=(card.dataset.name||"").toLowerCase();const category=(card.dataset.category||"").toLowerCase();if(name.includes(query)||category.includes(query)){card.style.display="flex";card.style.opacity="1";card.classList.remove("white-highlight");void card.offsetWidth;card.classList.add("white-highlight");found=true}else{card.style.opacity="0";setTimeout(()=>{if(card.style.opacity==="0"){card.style.display="none"}},250)}});if(!found){status.style.display="block";status.innerText=`No results found for "${query}"`}else{status.style.display="none"}}function createAppCard(data){const safeName=data.name||"Untitled App";const safeCategory=data.category||"Home";const safeIcon=data.icon||"https://via.placeholder.com/50?text=APP";const safeBanner=data.banner||"https://via.placeholder.com/280x90?text=App";const safeDownload=data.downloadUrl||"#";const card=document.createElement("div");card.className="app-card searchable-card";card.dataset.name=safeName;card.dataset.category=safeCategory;card.dataset.download=safeDownload;card.innerHTML=`<div class="app-header">${safeCategory}</div><div class="app-main"><img src="${safeIcon}" class="mini-icon" alt="${safeName} Icon"><div class="app-content"><img src="${safeBanner}" class="banner-logo" alt="${safeName} Banner"><div class="app-name">${safeName}</div><button class="btn-download">Download Now</button></div></div>`;card.querySelector(".btn-download").addEventListener("click",()=>{showAlert(safeDownload)});return card}
</script>
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";import{getAuth,createUserWithEmailAndPassword,signInWithEmailAndPassword,signOut,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";import{getFirestore,collection,addDoc,getDocs,serverTimestamp}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";const firebaseConfig={apiKey:"AIzaSyAbfE_Gm0Dw-SlLoppA0SSrKD5xYhzyd8M",authDomain:"pmm-open-source.firebaseapp.com",projectId:"pmm-open-source",storageBucket:"pmm-open-source.firebasestorage.app",messagingSenderId:"682708192312",appId:"1:682708192312:web:76765761fcea6bf69feacd",measurementId:"G-JZ0RT10XMP"};const app=initializeApp(firebaseConfig);const auth=getAuth(app);const db=getFirestore(app);console.log("Firebase Connected");window.register=async function(){const email=document.getElementById("email").value.trim();const password=document.getElementById("password").value.trim();if(!email||!password){alert("Please enter email and password.");return}try{await createUserWithEmailAndPassword(auth,email,password);alert("Account created successfully.")}catch(error){alert(error.message)}};window.login=async function(){const email=document.getElementById("email").value.trim();const password=document.getElementById("password").value.trim();if(!email||!password){alert("Please enter email and password.");return}try{await signInWithEmailAndPassword(auth,email,password);alert("Login successful.")}catch(error){alert(error.message)}};window.logout=async function(){try{await signOut(auth);alert("Logged out.")}catch(error){alert(error.message)}};onAuthStateChanged(auth,(user)=>{const status=document.getElementById("userStatus");if(user){status.innerText="Logged in: "+user.email}else{status.innerText="Not logged in"}});window.saveApp=async function(){const user=auth.currentUser;if(!user){alert("Please login before saving app.");return}const appName=document.getElementById("appName").value.trim();const appCategory=document.getElementById("appCategory").value;const appIcon=document.getElementById("appIcon").value.trim();const appBanner=document.getElementById("appBanner").value.trim();const downloadUrl=document.getElementById("downloadUrl").value.trim();if(!appName||!downloadUrl){alert("Please enter app name and download URL.");return}try{await addDoc(collection(db,"apps"),{name:appName,category:appCategory,icon:appIcon,banner:appBanner,downloadUrl:downloadUrl,createdBy:user.email,createdAt:serverTimestamp()});alert("App saved successfully.");document.getElementById("appName").value="";document.getElementById("appIcon").value="";document.getElementById("appBanner").value="";document.getElementById("downloadUrl").value="";await window.loadApps()}catch(error){alert(error.message)}};window.loadApps=async function(){const homeDynamicApps=document.getElementById("homeDynamicApps");const osDynamicApps=document.getElementById("osDynamicApps");homeDynamicApps.innerHTML="";osDynamicApps.innerHTML="";try{const querySnapshot=await getDocs(collection(db,"apps"));querySnapshot.forEach((doc)=>{const data=doc.data();const card=createAppCard(data);if(data.category==="Operating System"){osDynamicApps.appendChild(card)}else{homeDynamicApps.appendChild(card)}})}catch(error){console.error(error);alert(error.message)}};window.loadApps();
</script>
</body>
