<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waterfox Download Center</title>
    <style>
        /* 1. พื้นหลังขาวเบลอสีลอยไปมา (จากอันเดิม) */
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .gradient-bg {
            width: 100%; height: 100%; position: absolute;
            filter: blur(100px); -webkit-filter: blur(100px); z-index: 1;
        }
        .g1, .g2, .g3 {
            position: absolute; border-radius: 50%; opacity: 0.6;
        }
        .g1 { width: 80%; height: 80%; top: -10%; background: radial-gradient(circle, #64dcff 0, rgba(100,220,255,0) 50%); animation: move 20s infinite; }
        .g2 { width: 70%; height: 70%; bottom: -10%; right: -10%; background: radial-gradient(circle, #ff64dc 0, rgba(255,100,220,0) 50%); animation: move 15s reverse infinite; }
        @keyframes move { 0% { transform: translate(0,0); } 50% { transform: translate(20%, 10%); } 100% { transform: translate(0,0); } }

        /* 2. หน้าต่าง GUI ด้านขวาบน */
        .window {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 320px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            border: 1px solid rgba(255,255,255,0.5);
            z-index: 100;
            overflow: hidden;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        /* ส่วนหัวหน้าต่าง */
        .window-header {
            background: rgba(240, 240, 240, 0.9);
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #ddd;
        }

        .window-title { font-size: 14px; font-weight: bold; color: #333; }

        /* ไอคอนย่อ (Minimize) 50x50 */
        .btn-min {
            width: 30px; height: 30px; /* ขนาดปุ่มกด */
            background: #e0e0e0;
            border-radius: 6px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: 0.2s;
        }
        .btn-min:hover { background: #d0d0d0; }
        .btn-min::after { content: ""; width: 12px; height: 2px; background: #555; }

        /* ส่วนเนื้อหา */
        .window-content {
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        /* ไอคอน Waterfox แนวนอน (หาเองอัตโนมัติจากโลโก้ SVG) */
        .wf-logo {
            width: 180px;
            height: auto;
        }

        .browser-label { font-size: 18px; color: #222; font-weight: 500; }

        /* ปุ่มดาวน์โหลด */
        .download-btn {
            background: #2d5af5;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 16px;
            transition: 0.3s;
            text-decoration: none;
        }
        .download-btn:hover { background: #1a42cc; transform: translateY(-2px); }

        /* ไอคอนดาวน์โหลด (สร้างด้วย CSS เพื่อความคมชัดและไม่มีพื้นหลัง) */
        .dl-icon {
            width: 18px; height: 18px;
            border-left: 2px solid white;
            border-bottom: 2px solid white;
            border-right: 2px solid white;
            position: relative;
        }
        .dl-icon::before {
            content: "↓"; position: absolute; top: -10px; left: 3px; font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="gradient-bg">
        <div class="g1"></div>
        <div class="g2"></div>
    </div>

    <div class="window" id="wfWindow">
        <div class="window-header">
            <div class="window-title">System Explorer</div>
            <div class="btn-min" onclick="alert('ฟังก์ชันย่อหน้าต่างกำลังเตรียมใช้งาน')"></div>
        </div>
        <div class="window-content">
            <img src="https://upload.wikimedia.org/wikipedia/commons/f/f7/Waterfox_Logo_2019.svg" alt="Waterfox" class="wf-logo">
            
            <div class="browser-label">Waterfox Browser</div>
            
            <button class="download-btn" onclick="confirmDownload()">
                <div class="dl-icon"></div>
                Download Now
            </button>
        </div>
    </div>

    <script>
        function confirmDownload() {
            const check = confirm("คุณต้องการออกจากหน้านี้เพื่อไปดาวน์โหลดที่ GitHub ใช่หรือไม่?");
            if (check) {
                window.location.href = "https://github.com/BrowserWorks/waterfox";
            }
        }
    </script>

</body>
</html>
