<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>White Blur Background with Floating Colors</title>
    <style>
        /* ตั้งค่าพื้นฐานให้เต็มหน้าจอ */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* ซ่อน scrollbar */
            background-color: white; /* พื้นหลังหลักสีขาว */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Container สำหรับเก็บลูกบอลสี */
        .gradient-bg {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            /* **หัวใจสำคัญคือตรงนี้: ทำให้ทุกอย่างที่อยู่ข้างในเบลอ** */
            filter: blur(100px); 
            -webkit-filter: blur(100px);
            z-index: 1;
        }

        /* สไตล์พื้นฐานของลูกบอลสี (Gradients) */
        .g1, .g2, .g3, .g4, .g5 {
            position: absolute;
            mix-blend-mode: multiply; /* ทำให้สีผสมกันดูนุ่มนวลขึ้น */
            border-radius: 50%; /* ทำให้เป็นวงกลม */
            opacity: 0.8;
        }

        /* ตั้งค่าสี ขนาด และแอนิเมชั่นของแต่ละลูก */
        
        /* ลูกที่ 1: สีฟ้า */
        .g1 {
            width: 80%;
            height: 80%;
            top: -10%;
            left: -10%;
            background: radial-gradient(circle at center, rgba(100, 220, 255, 0.8) 0, rgba(100, 220, 255, 0) 50%) no-repeat;
            animation: moveVertical 30s ease infinite;
        }

        /* ลูกที่ 2: สีชมพู/ม่วง */
        .g2 {
            width: 80%;
            height: 80%;
            top: 10%;
            right: -10%;
            background: radial-gradient(circle at center, rgba(255, 100, 220, 0.8) 0, rgba(255, 100, 220, 0) 50%) no-repeat;
            animation: moveInCircle 20s reverse infinite;
        }

        /* ลูกที่ 3: สีเหลือง */
        .g3 {
            width: 60%;
            height: 60%;
            bottom: -10%;
            left: 10%;
            background: radial-gradient(circle at center, rgba(255, 225, 100, 0.8) 0, rgba(255, 225, 100, 0) 50%) no-repeat;
            animation: moveInCircle 40s linear infinite;
        }

        /* ลูกที่ 4: สีเขียวมินต์ */
        .g4 {
            width: 70%;
            height: 70%;
            bottom: 10%;
            right: 10%;
            background: radial-gradient(circle at center, rgba(100, 255, 200, 0.8) 0, rgba(100, 255, 200, 0) 50%) no-repeat;
            animation: moveHorizontal 25s ease infinite;
        }

        /* ลูกที่ 5: สีส้มอ่อน */
        .g5 {
            width: 100%;
            height: 100%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle at center, rgba(255, 180, 100, 0.5) 0, rgba(255, 180, 100, 0) 50%) no-repeat;
            opacity: 1;
        }

        /* **ส่วนกำหนดการเคลื่อนที่ (Animations)** */

        @keyframes moveInCircle {
            0% { transform: rotate(0deg); }
            50% { transform: rotate(180deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes moveVertical {
            0% { transform: translateY(-50%); }
            50% { transform: translateY(50%); }
            100% { transform: translateY(-50%); }
        }

        @keyframes moveHorizontal {
            0% { transform: translateX(-50%) translateY(-10%); }
            50% { transform: translateX(50%) translateY(10%); }
            100% { transform: translateX(-50%) translateY(-10%); }
        }

    </style>
</head>
<body>

    <div class="gradient-bg">
        <div class="g1"></div>
        <div class="g2"></div>
        <div class="g3"></div>
        <div class="g4"></div>
        <div class="g5"></div>
    </div>

</body>
</html>
